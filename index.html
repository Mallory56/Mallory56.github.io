<title>Portfolio Mallory</title>

<style>
/* Reset & base */
*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  overflow-x: hidden;
}

/* Zone CIEL */
.sky-zone {
  background: linear-gradient(to bottom, #cce8f4, #87CEEB, #4ab8e8, #1E90FF);
}

/* Zone OCÉAN */
.ocean-zone {
  background: linear-gradient(to bottom, #1565C0, #0d47a1, #203a43, #0a1628, #000814);
  position: relative;
  overflow: hidden;
}

/* Navbar */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(10px);
  z-index: 100;
}
nav a { transition: 0.3s; }
nav a:hover { color: #4fd1c5; }

/* Sections */
section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  position: relative;
  z-index: 20;
}

/* Vidéo baleine */
.whale-video {
  position: absolute;
  bottom: 50px;
  left: -400px;
  width: 400px;
  mix-blend-mode: screen;
  animation: swim 20s linear infinite;
  pointer-events: none;
}
@keyframes swim {
  0%   { left: -400px; }
  100% { left: 120%; }
}

/* Bulles */
.bubble {
  position: absolute;
  background: rgba(255,255,255,0.35);
  border-radius: 50%;
  pointer-events: none;
  bottom: 0;
  z-index: 1;
}
@keyframes rise {
  0%   { transform: translateY(0) scale(0.5); opacity: 0; }
  5%   { opacity: 0.6; }
  95%  { opacity: 0.4; }
  100% { opacity: 0; }
}

/* ADN déroulant */
.dna {
  position: fixed;
  right: 20px;
  top: 0;
  width: 10px;
  height: 100vh;
  background: repeating-linear-gradient(
    to bottom,
    #4fd1c5, #4fd1c5 5px,
    transparent 5px, transparent 10px
  );
  opacity: 0.5;
  animation: scrollDNA 5s linear infinite;
  z-index: 50;
}
@keyframes scrollDNA {
  0%   { background-position: 0 0; }
  100% { background-position: 0 10px; }
}

/* Nuages */
.cloud {
  position: absolute;
  border-radius: 50px;
  background: rgba(255,255,255,0.25);
  filter: blur(8px);
  pointer-events: none;
  animation: drift linear infinite;
}
@keyframes drift {
  0%   { transform: translateX(-200px); }
  100% { transform: translateX(110vw); }
}

/* Vague séparatrice */
@keyframes waveSlide {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Onglets projets */
.proj-tab {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7);
  padding: 8px 20px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
}
.proj-tab:hover  { background: rgba(255,255,255,0.15); color: white; }
.proj-tab.active { background: rgba(79,209,197,0.25); border-color: #4fd1c5; color: #4fd1c5; }

.proj-panel { text-align: left; }
.proj-panel.hidden { display: none; }

/* Groupes déroulants */
.proj-group { margin-bottom: 8px; }

.proj-group-btn {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  padding: 10px 16px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  transition: background 0.2s;
}
.proj-group-btn:hover { background: rgba(255,255,255,0.12); }
.proj-group-btn.open  { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-color: rgba(79,209,197,0.4); }
.proj-group-btn .arrow { transition: transform 0.3s; font-size: 12px; opacity: 0.7; }
.proj-group-btn.open .arrow { transform: rotate(180deg); }

.proj-group-content {
  display: none;
  flex-direction: column;
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.1);
  border-top: none;
  border-bottom-left-radius: 10px;
  border-bottom-right-radius: 10px;
  overflow: hidden;
}
.proj-group-content.open { display: flex; }
.proj-group-content a {
  padding: 9px 20px;
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: background 0.2s, color 0.2s;
}
.proj-group-content a:last-child { border-bottom: none; }
.proj-group-content a:hover { background: rgba(79,209,197,0.1); color: #4fd1c5; }

/* Poissons */
.fish {
  position: absolute;
  pointer-events: none;
  opacity: 0;
  z-index: 1;
  animation: swimFish linear infinite;
}
.fish.left  { animation-direction: normal; }
.fish.right { animation-direction: reverse; transform: scaleX(-1); }

@keyframes swimFish {
  0%   { left: -80px;  opacity: 0; }
  5%   { opacity: 1; }
  95%  { opacity: 1; }
  100% { left: 110%;   opacity: 0; }
}

/* Bioluminescence */
.biolum {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
  animation: pulse ease-in-out infinite;
}
@keyframes pulse {
  0%   { opacity: 0;    transform: scale(0.6); }
  50%  { opacity: 1;    transform: scale(1.2); }
  100% { opacity: 0;    transform: scale(0.6); }
}
</style>
</head>

/* --- Onglets projets --- */
document.querySelectorAll('.proj-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.proj-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.proj-panel').forEach(p => p.classList.add('hidden'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.remove('hidden');
  });
});

function toggleGroup(btn) {
  const content = btn.nextElementSibling;
  btn.classList.toggle('open');
  content.classList.toggle('open');
}

/* --- Bulles : s'arrêtent à la surface (haut de .ocean-zone) --- */
function createBubble() {
  const oceanZone = document.querySelector('.ocean-zone');
  const oceanTop  = oceanZone.getBoundingClientRect().top + window.scrollY;
  const oceanH    = oceanZone.offsetHeight;

  const bubble = document.createElement('div');
  bubble.classList.add('bubble');

  const size     = Math.random() * 15 + 5;
  const duration = Math.random() * 5 + 5;

  bubble.style.width  = size + 'px';
  bubble.style.height = size + 'px';
  bubble.style.left   = Math.random() * window.innerWidth + 'px';

  /* La bulle monte depuis le bas de l'océan jusqu'au tout haut de l'océan,
     jamais au-delà : translateY max = -oceanH */
  bubble.style.animation = `rise ${duration}s linear forwards`;
  bubble.style.setProperty('--rise', `-${oceanH}px`);

  oceanZone.appendChild(bubble);
  setTimeout(() => bubble.remove(), duration * 1000 + 200);
}

function createFish() {

function createBiolum() {
  const oceanZone = document.querySelector('.ocean-zone');
  const oceanH    = oceanZone.offsetHeight;

  const dot = document.createElement('div');

  /* Taille : 2 à 6px, très petit */

  dot.style.width  = size + 'px';
  dot.style.height = size + 'px';

  /* Position : plutôt dans les 2/3 bas (les profondeurs) */

  dot.style.top  = (Math.random() * oceanH * 0.7 + oceanH * 0.3) + 'px';

  dot.style.boxShadow = `0 0 ${size * 3}px ${size}px ${glowColor}`;

  dot.style.animationDelay    = (Math.random() * -6) + 's';

  oceanZone.appendChild(dot);
  setTimeout(() => dot.remove(), (duration * 4 + 2) * 1000);
}
