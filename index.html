<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Portfolio Mallory</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* Reset & base */
*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  overflow-x: hidden;
}

/* Zone CIEL */
.sky-zone {
  background: linear-gradient(to bottom, #cce8f4, #87CEEB, #4ab8e8, #1E90FF);
}

/* Zone OCÉAN */
.ocean-zone {
  background: linear-gradient(to bottom, #1565C0, #0d47a1, #203a43, #0a1628, #000814);
  position: relative;
  overflow: hidden;
}

/* Navbar */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(10px);
  z-index: 100;
}
nav a { transition: 0.3s; }
nav a:hover { color: #4fd1c5; }

/* Sections */
section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  position: relative;
  z-index: 10;
}

/* Vidéo baleine */
.whale-video {
  position: absolute;
  bottom: 50px;
  left: -400px;
  width: 400px;
  mix-blend-mode: screen;
  animation: swim 20s linear infinite;
  pointer-events: none;
}
@keyframes swim {
  0%   { left: -400px; }
  100% { left: 120%; }
}

/* Bulles */
.bubble {
  position: absolute;
  background: rgba(255,255,255,0.35);
  border-radius: 50%;
  pointer-events: none;
  bottom: 0;
}
@keyframes rise {
  0%   { transform: translateY(0) scale(0.5); opacity: 0; }
  5%   { opacity: 0.6; }
  95%  { opacity: 0.4; }
  100% { opacity: 0; }
}

/* ADN déroulant */
.dna {
  position: fixed;
  right: 20px;
  top: 0;
  width: 10px;
  height: 100vh;
  background: repeating-linear-gradient(
    to bottom,
    #4fd1c5, #4fd1c5 5px,
    transparent 5px, transparent 10px
  );
  opacity: 0.5;
  animation: scrollDNA 5s linear infinite;
  z-index: 50;
}
@keyframes scrollDNA {
  0%   { background-position: 0 0; }
  100% { background-position: 0 10px; }
}

/* Nuages */
.cloud {
  position: absolute;
  border-radius: 50px;
  background: rgba(255,255,255,0.25);
  filter: blur(8px);
  pointer-events: none;
  animation: drift linear infinite;
}
@keyframes drift {
  0%   { transform: translateX(-200px); }
  100% { transform: translateX(110vw); }
}

/* Vague séparatrice */
@keyframes waveSlide {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Poissons */
.fish {
  position: absolute;
  pointer-events: none;
  opacity: 0;
  animation: swimFish linear infinite;
}
.fish.left  { animation-direction: normal; }
.fish.right { animation-direction: reverse; transform: scaleX(-1); }

@keyframes swimFish {
  0%   { left: -80px;  opacity: 0; }
  5%   { opacity: 1; }
  95%  { opacity: 1; }
  100% { left: 110%;   opacity: 0; }
}

/* Bioluminescence */
.biolum {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: pulse ease-in-out infinite;
}
@keyframes pulse {
  0%   { opacity: 0;    transform: scale(0.6); }
  50%  { opacity: 1;    transform: scale(1.2); }
  100% { opacity: 0;    transform: scale(0.6); }
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="flex justify-center space-x-6 p-4 max-w-6xl mx-auto">
  <a href="#home"     class="font-bold">Accueil</a>
  <a href="#about"    class="font-bold">À propos</a>
  <a href="#projects" class="font-bold">Projets</a>
  <a href="#contact"  class="font-bold">Contact</a>
</nav>

<!-- ADN -->
<div class="dna"></div>

<!-- ===== ZONE CIEL ===== -->
<div class="sky-zone" id="sky-wrapper" style="position:relative; overflow:hidden;">
  <section id="home">
    <h1 class="text-6xl font-bold mb-4">Mallory Le Corre</h1>
    <p class="text-xl opacity-80">Bio-informaticienne 🌊</p>
  </section>
</div>

<!-- ===== SÉPARATEUR : vague ciel -> océan ===== -->
<div id="wave-separator" style="position:relative; height:80px; overflow:hidden; background:#1565C0; z-index:5;">
  <svg viewBox="0 0 2880 80" preserveAspectRatio="none"
       style="position:absolute; top:0; left:0; width:200%; height:80px; animation: waveSlide 9s linear infinite;">
    <path fill="#1E90FF"
          d="M0,40 C240,0 480,80 720,40 C960,0 1200,80 1440,40 C1680,0 1920,80 2160,40 C2400,0 2640,80 2880,40 L2880,0 L0,0 Z"/>
  </svg>
</div>

<!-- ===== ZONE OCÉAN ===== -->
<div class="ocean-zone">

  <!-- Section À propos -->
  <section id="about">
    <div class="bg-white/10 backdrop-blur-xl p-10 rounded-3xl shadow-xl max-w-xl">
      <h2 class="text-3xl mb-4">À propos</h2>
      <p>Passionné par les baleines</p>
    </div>
  </section>

  <!-- Section Projets -->
  <section id="projects">
    <div class="bg-white/10 backdrop-blur-xl p-10 rounded-3xl shadow-xl max-w-xl">
      <h2 class="text-3xl mb-4">Projets</h2>
      <p>Projet 1<br>Projet 2<br>Projet 3</p>
    </div>
  </section>

  <!-- Section Contact -->
  <section id="contact">
    <div class="bg-white/10 backdrop-blur-xl p-10 rounded-3xl shadow-xl max-w-xl">
      <h2 class="text-3xl mb-4">Contact</h2>
      <p>mail@email.com</p>
      <p>LinkedIn</p>
    </div>
  </section>

  <!-- Vidéo baleine -->
  <video autoplay loop muted playsinline class="whale-video">
    <source src="whale.mp4" type="video/mp4">
    Votre navigateur ne supporte pas les vidéos.
  </video>

</div>

<script>
/* --- Bulles : s'arrêtent à la surface (haut de .ocean-zone) --- */
function createBubble() {
  const oceanZone = document.querySelector('.ocean-zone');
  const oceanTop  = oceanZone.getBoundingClientRect().top + window.scrollY;
  const oceanH    = oceanZone.offsetHeight;

  const bubble = document.createElement('div');
  bubble.classList.add('bubble');

  const size     = Math.random() * 15 + 5;
  const duration = Math.random() * 5 + 5;

  bubble.style.width  = size + 'px';
  bubble.style.height = size + 'px';
  bubble.style.left   = Math.random() * window.innerWidth + 'px';

  /* La bulle monte depuis le bas de l'océan jusqu'au tout haut de l'océan,
     jamais au-delà : translateY max = -oceanH */
  bubble.style.animation = `rise ${duration}s linear forwards`;
  bubble.style.setProperty('--rise', `-${oceanH}px`);

  oceanZone.appendChild(bubble);
  setTimeout(() => bubble.remove(), duration * 1000 + 200);
}

/* On adapte le @keyframes dynamiquement via une règle CSS avec la variable --rise */
const styleSheet = document.createElement('style');
styleSheet.textContent = `
  @keyframes rise {
    0%   { transform: translateY(0) scale(0.5); opacity: 0; }
    5%   { opacity: 0.6; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(var(--rise)) scale(1); opacity: 0; }
  }
`;
document.head.appendChild(styleSheet);

setInterval(createBubble, 600);

/* --- Poissons dans l'océan --- */
const fishShapes = [
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 50" width="60" height="30">
    <path fill="currentColor" d="M72,25 C72,25 85,10 100,8 C95,18 94,25 95,32 C100,42 85,40 72,25 Z M72,25 C65,14 50,8 32,10 C18,12 8,18 4,25 C8,32 18,38 32,40 C50,42 65,36 72,25 Z M10,22 C10,22 6,20 4,25 C6,30 10,28 10,28 Z"/>
  </svg>`,
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" width="55" height="33">
    <path fill="currentColor" d="M65,30 C65,30 80,12 100,10 C94,22 93,30 94,38 C100,50 80,48 65,30 Z M65,30 C58,18 42,10 25,13 C12,15 4,22 2,30 C4,38 12,45 25,47 C42,50 58,42 65,30 Z M35,13 C38,6 48,4 55,8 C52,13 45,14 35,13 Z M8,27 C8,27 4,24 2,30 C4,36 8,33 8,33 Z"/>
  </svg>`,
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="70" height="24">
    <path fill="currentColor" d="M88,20 C88,20 100,8 120,6 C116,15 115,20 116,25 C120,34 100,32 88,20 Z M88,20 C80,12 62,6 40,8 C22,10 8,15 4,20 C8,25 22,30 40,32 C62,34 80,28 88,20 Z M6,18 C6,18 3,16 2,20 C3,24 6,22 6,22 Z"/>
  </svg>`,
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 60" width="46" height="35">
    <path fill="currentColor" d="M52,30 C52,30 62,16 78,14 C74,22 73,30 74,38 C78,46 62,44 52,30 Z M52,30 C46,18 34,10 22,12 C12,14 5,21 4,30 C5,39 12,46 22,48 C34,50 46,42 52,30 Z M24,12 C26,5 36,3 42,8 C40,12 33,13 24,12 Z M24,48 C26,55 36,57 42,52 C40,48 33,47 24,48 Z M8,27 C8,27 4,24 4,30 C4,36 8,33 8,33 Z"/>
  </svg>`,
];

const fishColors = [
  'rgba(255,255,255,0.12)',
  'rgba(100,200,255,0.10)',
  'rgba(150,220,255,0.10)',
  'rgba(255,255,255,0.08)',
  'rgba(80,180,220,0.12)',
];

function createFish() {
  const oceanZone = document.querySelector('.ocean-zone');
  const oceanH    = oceanZone.offsetHeight;

  const fish = document.createElement('div');
  fish.classList.add('fish');

  const goRight = Math.random() > 0.5;
  fish.classList.add(goRight ? 'left' : 'right');

  fish.innerHTML = fishShapes[Math.floor(Math.random() * fishShapes.length)];
  fish.style.color = fishColors[Math.floor(Math.random() * fishColors.length)];

  const scale = Math.random() * 0.8 + 0.6;
  fish.style.transform = goRight ? `scale(-${scale}, ${scale})` : `scale(${scale})`;

  fish.style.top = (Math.random() * 85 + 5) + '%';

  const duration = Math.random() * 27 + 18;
  fish.style.animationDuration = duration + 's';
  fish.style.animationDelay    = (Math.random() * -20) + 's';

  oceanZone.appendChild(fish);
  setTimeout(() => fish.remove(), (duration + 20) * 1000);
}

for (let i = 0; i < 3; i++) setTimeout(createFish, i * 3000);
setInterval(createFish, 9000);

/* --- Bioluminescence dans les profondeurs --- */
const bioColors = [
  'rgba(0, 255, 180, VAL)',   /* vert cyan */
  'rgba(80, 180, 255, VAL)',  /* bleu électrique */
  'rgba(180, 100, 255, VAL)', /* violet */
  'rgba(0, 220, 255, VAL)',   /* cyan pur */
  'rgba(100, 255, 200, VAL)', /* vert menthe */
];

function createBiolum() {
  const oceanZone = document.querySelector('.ocean-zone');
  const oceanH    = oceanZone.offsetHeight;
  const oceanW    = oceanZone.offsetWidth;

  const dot = document.createElement('div');
  dot.classList.add('biolum');

  /* Taille : 2 à 6px, très petit */
  const size = Math.random() * 4 + 2;
  dot.style.width  = size + 'px';
  dot.style.height = size + 'px';

  /* Position : plutôt dans les 2/3 bas (les profondeurs) */
  dot.style.left = (Math.random() * oceanW) + 'px';
  dot.style.top  = (Math.random() * oceanH * 0.7 + oceanH * 0.3) + 'px';

  /* Couleur avec opacité faible */
  const col = bioColors[Math.floor(Math.random() * bioColors.length)];
  const opacity = Math.random() * 0.4 + 0.2;
  dot.style.background = col.replace('VAL', opacity);

  /* Halo très léger autour du point */
  const glowColor = col.replace('VAL', 0.15);
  dot.style.boxShadow = `0 0 ${size * 3}px ${size}px ${glowColor}`;

  /* Durée de pulsation : 2 à 6s, délai aléatoire */
  const duration = Math.random() * 4 + 2;
  dot.style.animationDuration = duration + 's';
  dot.style.animationDelay    = (Math.random() * -6) + 's';

  oceanZone.appendChild(dot);
  setTimeout(() => dot.remove(), (duration * 4 + 2) * 1000);
}

/* Peupler au départ puis renouveler */
for (let i = 0; i < 40; i++) setTimeout(createBiolum, i * 150);
setInterval(createBiolum, 800);

/* --- Nuages dans le ciel --- */
function createCloud() {
  const skyZone = document.getElementById('sky-wrapper');
  const cloud = document.createElement('div');
  cloud.classList.add('cloud');
  const w = Math.random() * 180 + 80;
  const h = w * 0.35;
  cloud.style.width  = w + 'px';
  cloud.style.height = h + 'px';
  cloud.style.top    = (Math.random() * 60 + 5) + '%';
  cloud.style.left   = '-220px';
  const duration = Math.random() * 40 + 30;
  cloud.style.animationDuration = duration + 's';
  cloud.style.opacity = (Math.random() * 0.3 + 0.1).toString();
  skyZone.appendChild(cloud);
  setTimeout(() => cloud.remove(), duration * 1000 + 1000);
}
for (let i = 0; i < 4; i++) setTimeout(createCloud, i * 4000);
setInterval(createCloud, 8000);
</script>

</body>
</html>
