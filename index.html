<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Portfolio Mallory</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(#87CEEB, #1E90FF);
  height:100vh;
  overflow:hidden;
  color:white;
  text-align:center;
}

h1 {
  margin-top:100px;
  font-size:50px;
}

.whale {
  position:absolute;
  bottom:50px;
  left:-300px;
  width:300px;
  animation: swim 12s linear infinite;
}

@keyframes swim {
  0% { left:-300px; }
  100% { left:110%; }
}
</style>

</head>

<body>

<h1>Bienvenue sur mon portfolio</h1>
<p>Développeur passionné</p>

<img class="whale" src="https://i.imgur.com/7yUvePI.png">

</body>
