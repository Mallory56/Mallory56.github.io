<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Portfolio Mallory</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* Reset & base */
*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  overflow-x: hidden;
}

/* Zone CIEL */
.sky-zone {
  background: linear-gradient(to bottom, #cce8f4, #87CEEB, #4ab8e8, #1E90FF);
}

/* Zone OCÉAN */
.ocean-zone {
  background: linear-gradient(to bottom, #1565C0, #0d47a1, #203a43, #0a1628, #000814);
}

/* Navbar */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(10px);
  z-index: 100;
}
nav a { transition: 0.3s; }
nav a:hover { color: #4fd1c5; }

/* Sections */
section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  position: relative;
  z-index: 10;
}

/* Vidéo baleine */
.whale-video {
  position: absolute;
  bottom: 50px;
  left: -400px;
  width: 400px;
  mix-blend-mode: screen;
  animation: swim 20s linear infinite;
  pointer-events: none;
}
@keyframes swim {
  0%   { left: -400px; }
  100% { left: 120%; }
}

/* Bulles */
.bubble {
  position: absolute;
  bottom: -50px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  pointer-events: none;
  animation: rise linear infinite;
}
@keyframes rise {
  0%   { transform: translateY(0) scale(0.5); opacity: 0; }
  10%  { opacity: 0.5; }
  100% { transform: translateY(-120vh) scale(1); opacity: 0; }
}

/* ADN déroulant */
.dna {
  position: fixed;
  right: 20px;
  top: 0;
  width: 10px;
  height: 100vh;
  background: repeating-linear-gradient(
    to bottom,
    #4fd1c5, #4fd1c5 5px,
    transparent 5px, transparent 10px
  );
  opacity: 0.5;
  animation: scrollDNA 5s linear infinite;
  z-index: 50;
}
@keyframes scrollDNA {
  0%   { background-position: 0 0; }
  100% { background-position: 0 10px; }
}

/* Nuages */
.cloud {
  position: absolute;
  border-radius: 50px;
  background: rgba(255,255,255,0.25);
  filter: blur(8px);
  pointer-events: none;
  animation: drift linear infinite;
}
@keyframes drift {
  0%   { transform: translateX(-200px); }
  100% { transform: translateX(110vw); }
}

/* Vague séparatrice */
@keyframes waveSlide {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="flex justify-center space-x-6 p-4 max-w-6xl mx-auto">
  <a href="#home"     class="font-bold">Accueil</a>
  <a href="#about"    class="font-bold">À propos</a>
  <a href="#projects" class="font-bold">Projets</a>
  <a href="#contact"  class="font-bold">Contact</a>
</nav>

<!-- ADN -->
<div class="dna"></div>

<!-- ===== ZONE CIEL ===== -->
<div class="sky-zone" id="sky-wrapper" style="position:relative; overflow:hidden;">

  <!-- Section Accueil -->
  <section id="home">
    <h1 class="text-6xl font-bold mb-4">Mallory Le Corre</h1>
    <p class="text-xl opacity-80">Bio-informaticienne 🌊</p>
  </section>

</div>

<!-- ===== SÉPARATEUR : vague ciel -> océan ===== -->
<div style="position:relative; height:80px; overflow:hidden; background:#1565C0;">
  <svg viewBox="0 0 2880 80" preserveAspectRatio="none"
       style="position:absolute; top:0; left:0; width:200%; height:80px; animation: waveSlide 9s linear infinite;">
    <path fill="#1E90FF"
          d="M0,40 C240,0 480,80 720,40 C960,0 1200,80 1440,40 C1680,0 1920,80 2160,40 C2400,0 2640,80 2880,40 L2880,0 L0,0 Z"/>
  </svg>
</div>

<!-- ===== ZONE OCÉAN ===== -->
<div class="ocean-zone" style="position:relative; overflow:hidden;">

  <!-- Section À propos -->
  <section id="about">
    <div class="bg-white/10 backdrop-blur-xl p-10 rounded-3xl shadow-xl max-w-xl">
      <h2 class="text-3xl mb-4">À propos</h2>
      <p>Passionné par les baleines</p>
    </div>
  </section>

  <!-- Section Projets -->
  <section id="projects">
    <div class="bg-white/10 backdrop-blur-xl p-10 rounded-3xl shadow-xl max-w-xl">
      <h2 class="text-3xl mb-4">Projets</h2>
      <p>Projet 1<br>Projet 2<br>Projet 3</p>
    </div>
  </section>

  <!-- Section Contact -->
  <section id="contact">
    <div class="bg-white/10 backdrop-blur-xl p-10 rounded-3xl shadow-xl max-w-xl">
      <h2 class="text-3xl mb-4">Contact</h2>
      <p>mail@email.com</p>
      <p>LinkedIn</p>
    </div>
  </section>

  <!-- Vidéo baleine -->
  <video autoplay loop muted playsinline class="whale-video">
    <source src="whale.mp4" type="video/mp4">
    Votre navigateur ne supporte pas les vidéos.
  </video>

</div>

<script>
/* --- Bulles dans l'océan --- */
function createBubble() {
  const oceanZone = document.querySelector('.ocean-zone');
  const bubble = document.createElement('div');
  bubble.classList.add('bubble');
  const size = Math.random() * 15 + 5;
  bubble.style.width  = size + 'px';
  bubble.style.height = size + 'px';
  bubble.style.left   = Math.random() * window.innerWidth + 'px';
  bubble.style.animationDuration = (Math.random() * 5 + 5) + 's';
  oceanZone.appendChild(bubble);
  setTimeout(() => bubble.remove(), 10000);
}
setInterval(createBubble, 200);

/* --- Nuages dans le ciel --- */
function createCloud() {
  const skyZone = document.getElementById('sky-wrapper');
  const cloud = document.createElement('div');
  cloud.classList.add('cloud');
  const w = Math.random() * 180 + 80;
  const h = w * 0.35;
  cloud.style.width  = w + 'px';
  cloud.style.height = h + 'px';
  cloud.style.top    = (Math.random() * 60 + 5) + '%';
  cloud.style.left   = '-220px';
  const duration = Math.random() * 40 + 30;
  cloud.style.animationDuration = duration + 's';
  cloud.style.opacity = (Math.random() * 0.3 + 0.1).toString();
  skyZone.appendChild(cloud);
  setTimeout(() => cloud.remove(), duration * 1000 + 1000);
}
for (let i = 0; i < 4; i++) setTimeout(createCloud, i * 4000);
setInterval(createCloud, 8000);
</script>

</body>
</html>
